name: Build CannaScope CT executables

# Builds a single-file executable for Windows, macOS, and Linux whenever you push
# a tag like v0.2.0, and attaches them to the matching GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # lets the workflow attach the built binaries to the Release

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset: CannaScope-CT-windows.exe
          - os: macos-latest
            asset: CannaScope-CT-macos
          - os: ubuntu-latest
            asset: CannaScope-CT-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller --onefile --name "${{ matrix.asset }}" cannascope_ct_v2.py
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
