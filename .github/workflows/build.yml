name: Build standalone executables

# Builds a single-file executable for Windows, macOS, and Linux whenever you
# push a tag like v0.1.0-beta, and attaches them to the GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset: ct-contaminant-checker-windows.exe
          - os: macos-latest
            asset: ct-contaminant-checker-macos
          - os: ubuntu-latest
            asset: ct-contaminant-checker-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pyinstaller
      - run: pyinstaller --onefile --name "${{ matrix.asset }}" connecticut_cannabis_contaminant_checker_beta_v1.py
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*
      # Attach to a GitHub Release when triggered by a tag push
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
